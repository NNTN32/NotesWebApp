name: Build & Integration Test Notes App

on:
  push:
    branches: [ "main", "feature/**" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./notesWeb
        
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven' #Caching Maven dependencies for faster builds

      - name: Build with Maven
        run: ./mvnw clean package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3 #Optimize -> use for managing build images and caching

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and Push SHA Image
        uses: docker/build-push-action@v5
        with:
          context: ./notesWeb
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/notes-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start Services & Integration Test
        env:
        # App
         DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

        # Database
         DB_URL: ${{ secrets.DB_URL }}
         DB_USERNAME: ${{ secrets.DB_USERNAME }}
         DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

        # JWT
         JWT_SECRET: ${{ secrets.JWT_SECRET }}
         JWT_EXPIRATION: ${{ secrets.JWT_EXPIRATION }}

        # Redis
         REDIS_HOST: ${{ secrets.REDIS_HOST }}
         REDIS_PORT: ${{ secrets.REDIS_PORT }}

        # Kafka
         KAFKA_BOOTSTRAP_SERVERS: ${{ secrets.KAFKA_BOOTSTRAP_SERVERS }}

        # RabbitMQ
         RABBIT_HOST: ${{ secrets.RABBIT_HOST }}
         RABBIT_PORT: ${{ secrets.RABBIT_PORT }}
         RABBIT_USERNAME: ${{ secrets.RABBIT_USERNAME }}
         RABBIT_PASSWORD: ${{ secrets.RABBIT_PASSWORD }}
         RABBIT_STOMP_PORT: ${{ secrets.RABBIT_STOMP_PORT }}

        # Cloudinary
         CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
         CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
         CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}

        # Image version
         APP_VERSION: ${{ github.sha }}

        run: |
          docker compose up -d 
          echo "Waiting for service to be healthy..."
          #Loop check Swagger
          for i in {1..20}; do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:8081/v3/api-docs | grep -q "200"; then
              echo "Swagger is up & running!"
              exit 0
            fi
            echo "Waiting for api.. ($i/20)"
            sleep 5
          done
          echo "Integration test failed!"
          docker compose logs notes-app
          exit 1

      - name: Promote Image to Branch Tag
        if: success()
        run: |
          IMAGE_NAME=${{ secrets.DOCKERHUB_USERNAME }}/notes-app
          SHA_TAG=${{ github.sha }}
          
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "Promoting to LATEST"
            docker pull $IMAGE_NAME:$SHA_TAG
            docker tag $IMAGE_NAME:$SHA_TAG $IMAGE_NAME:latest
            docker push $IMAGE_NAME:latest
          else
            CLEAN_BRANCH=$(echo ${{ github.ref_name }} | sed 's/\//-/g')
            echo "Promoting to feature-$CLEAN_BRANCH"
            docker pull $IMAGE_NAME:$SHA_TAG
            docker tag $IMAGE_NAME:$SHA_TAG $IMAGE_NAME:feature-$CLEAN_BRANCH
            docker push $IMAGE_NAME:feature-$CLEAN_BRANCH
          fi

      - name: Shutdown
        if: always()
        run: docker compose down